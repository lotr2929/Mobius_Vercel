<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Mobius - Sign Up</title>
    <link rel="icon" type="image/png" href="mobius-logo.png">
    <style>
        body {
            font-family: 'Century Gothic', 'Avenir', 'Segoe UI', 'Verdana', sans-serif;
            padding: 20px;
            max-width: 400px;
            margin: 80px auto;
            background: #e2dccd;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }
        h1 { margin: 0; font-size: 48px; }
        input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #8d7c64;
            border-radius: 1px;
            box-sizing: border-box;
            background: #f5eedd;
            font-family: 'Century Gothic', 'Avenir', 'Segoe UI', 'Verdana', sans-serif;
            margin-bottom: 10px;
        }
        button {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            background: #8d7c64;
            color: white;
            border: none;
            border-radius: 1px;
            cursor: pointer;
            margin-top: 6px;
        }
        button:hover { background: #574d3e; }
        #error { color: #8B0000; margin-top: 10px; font-size: 14px; }
        #success { color: #2d5a27; margin-top: 10px; font-size: 14px; }
        .password-wrapper { position: relative; margin-bottom: 10px; }
        .password-wrapper input { margin-bottom: 0; padding-right: 44px; }
        .eye-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            margin: 0;
            width: auto;
            font-size: 18px;
            color: #8d7c64;
            line-height: 1;
        }
        .eye-btn:hover { color: #4a3728; background: none; }
    </style>
</head>
<body>
    <div class="logo">
        <img src="mobius-logo.png" style="height: 75px;">
        <h1>Mobius</h1>
    </div>

    <label style="font-size:14px; color:#4a3728;">Email</label>
    <input type="email" id="email" placeholder="Enter email">

    <label style="font-size:14px; color:#4a3728;">Password</label>
    <div class="password-wrapper">
        <input type="password" id="password" placeholder="Enter password (min 6 characters)">
        <button class="eye-btn" type="button" onclick="togglePassword()" id="eyeBtn">👁</button>
    </div>

    <button onclick="signup()">Sign Up</button>
    <p style="margin-top: 20px; font-size: 14px; color: #4a3728;">
        Already have an account? <a href="/login" style="color: #8d7c64;">Log in</a>
    </p>
    <div id="error"></div>
    <div id="success"></div>

    <script>
        function togglePassword() {
            const pwd = document.getElementById('password');
            const btn = document.getElementById('eyeBtn');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                btn.textContent = '🙈';
            } else {
                pwd.type = 'password';
                btn.textContent = '👁';
            }
        }

        async function signup() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            document.getElementById('error').textContent = '';
            document.getElementById('success').textContent = '';

            if (!email || !password) {
                document.getElementById('error').textContent = 'Please enter email and password.';
                return;
            }
            if (password.length < 6) {
                document.getElementById('error').textContent = 'Password must be at least 6 characters.';
                return;
            }

            try {
                const res = await fetch('/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (data.userId) {
                    localStorage.setItem('mobius_user_id', data.userId);
                    localStorage.setItem('mobius_username', data.username);
                    const expires = new Date(Date.now() + 10*365*24*60*60*1000).toUTCString();
                    document.cookie = `mobius_user_id=${data.userId}; expires=${expires}; path=/`;
                    document.cookie = `mobius_username=${data.username}; expires=${expires}; path=/`;
                    window.location.href = '/';
                } else if (data.needsConfirmation) {
                    document.getElementById('success').textContent = 'Account created! Please check your email to confirm, then log in.';
                } else if (data.error) {
                    document.getElementById('error').textContent = data.error;
                } else {
                    document.getElementById('error').textContent = 'Sign up failed. Please try again.';
                }
            } catch (err) {
                document.getElementById('error').textContent = 'Something went wrong. Please try again.';
            }
        }
    </script>
</body>
</html>
