<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Mobius</title>
    <link rel="icon" type="image/png" href="mobius-logo.png">
    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8d7c64">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="mobius">
    <style>
        :root {
            --bg:         #e2dccd;
            --surface:    #f5eedd;
            --surface2:   #ede5d4;
            --border:     #c9bfae;
            --border2:    #8d7c64;
            --text:       #3a2e22;
            --text-muted: #6a5a48;
            --text-dim:   #8d7c64;
            --accent:     #8d7c64;
            --accent2:    #574d3e;
            --green:      #4a7c4e;
            --red:        #8d3a3a;
            --code-bg:    #2a2118;
            --user-color: #4a3728;
            --font:       'Century Gothic', 'Avenir', 'Segoe UI', 'Verdana', sans-serif;
            --font-mono:  'Cascadia Code', 'Fira Code', 'Consolas', monospace;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            font-size: 15px;
            line-height: 1.6;
            overflow: hidden;
        }

        /* ── App shell ── */
        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* ── Workspace: left chat + right panel ── */
        #workspace {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        #left {
            display: flex;
            flex-direction: column;
            flex: 1;
            max-width: 800px;
            margin: 0 auto;
            min-width: 0;
            overflow: hidden;
        }
        body.panel-open #left {
            max-width: none;
            margin: 0;
        }
        #right {
            display: none;
            width: 70%;
            min-width: 200px;
            flex-shrink: 0;
            flex-direction: column;
            background: var(--surface);
        }
        body.panel-open #right { display: flex; }

        /* ── Panel internals ── */
        #panelBar {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        #panelTitle {
            font-size: 13px;
            font-weight: bold;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }
        .panel-badge {
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 8px;
            background: var(--border);
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .panel-badge-code   { background: #2a2118; color: #86efac; }
        .panel-badge-html   { background: var(--surface2); color: var(--green); }
        .panel-badge-edit   { background: var(--surface2); color: var(--accent2); }
        .panel-badge-output { background: var(--surface2); color: var(--text-dim); }
        .panel-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            color: var(--text-dim);
            padding: 3px 5px;
            border-radius: 2px;
            display: flex;
            align-items: center;
        }
        .panel-btn:hover { color: var(--text); background: var(--border); }
        #panelBody {
            flex: 1;
            overflow-y: auto;
            overflow-x: auto;
        }
        #panelBody::-webkit-scrollbar { width: 6px; }
        #panelBody::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
        .panel-body pre {
            margin: 0;
            padding: 16px;
            background: var(--code-bg);
            color: #d4d4d4;
            font-family: var(--font-mono);
            font-size: 13px;
            line-height: 1.5;
            min-height: 100%;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .panel-body pre code { background: none; border: none; padding: 0; color: inherit; font-size: inherit; }
        .panel-body-output pre { background: var(--surface2); color: var(--text); }
        .panel-html {
            padding: 16px;
            font-size: 14px;
            line-height: 1.6;
        }
        #panelEditArea {
            width: 100%;
            height: calc(100% - 40px);
            padding: 16px;
            font-family: var(--font-mono);
            font-size: 13px;
            line-height: 1.5;
            background: var(--surface);
            color: var(--text);
            border: none;
            outline: none;
            resize: none;
        }
        #panelSaveBar {
            padding: 6px 12px;
            border-top: 1px solid var(--border);
            background: var(--surface2);
        }
        .panel-save-btn {
            padding: 4px 16px;
            background: var(--green);
            color: white;
            border: none;
            border-radius: 1px;
            cursor: pointer;
            font-family: var(--font);
            font-size: 13px;
        }
        /* Panel toggle button active state */
        .header-btn.active { background: var(--surface2); color: var(--text); }

        /* ── Header ── */
        #header {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 16px 10px 2px;
            background: var(--bg);
            flex-shrink: 0;
            flex-wrap: nowrap;
        }
        #header img {
            height: 60px;
            width: 60px;
            object-fit: contain;
            flex-shrink: 0;
        }
        #header h1 {
            font-size: 36px;
            font-weight: bold;
            color: #4a7c4e;
            white-space: nowrap;
            flex-shrink: 0;
        }
        #header h1 span { color: #3e5f41; }
        #headerRight {
            margin-left: auto;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 2px;
            flex-wrap: nowrap;
        }
        #headerTop {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        #headerClock {
            font-size: 11px;
            color: var(--text-dim);
            text-align: right;
            white-space: nowrap;
        }
        #modelBadge {
            font-size: 13px;
            color: var(--text-dim);
            white-space: nowrap;
        }
        #statusDot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
            flex-shrink: 0;
        }
        #statusDot.offline { background: var(--border2); }
        .header-btn {
            font-size: 13px;
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--border2);
            padding: 2px 8px;
            border-radius: 1px;
            cursor: pointer;
            font-family: var(--font);
            white-space: nowrap;
            height: auto;
        }
        .header-btn:hover { background: var(--surface2); }

        /* ── Input area (TOP) ── */
        #inputArea {
            flex-shrink: 0;
            padding: 4px 10px 10px;
            background: var(--bg);
        }
        #input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border-radius: 1px;
            box-sizing: border-box;
            font-family: var(--font);
            resize: vertical;
            min-height: 60px;
            max-height: 200px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            outline: none;
            display: block;
        }
        #input:focus { border-color: var(--border2); }
        #input::placeholder { color: var(--text-dim); }

        /* ── Controls toolbar ── */
        .controls {
            display: flex;
            gap: 4px;
            margin-top: 6px;
            align-items: center;
            height: 28px;
        }
        .icon-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 3px 5px;
            border-radius: 2px;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.15s, background 0.15s;
            height: 28px;
        }
        .icon-btn:hover { color: var(--text); background: var(--surface2); }
        .icon-btn.active-up   { color: var(--green); }
        .icon-btn.active-down { color: var(--red); }
        .icon-btn svg { display: block; }

        /* ── Chat panel ── */
        #chatPanel {
            flex: 1;
            overflow-y: auto;
            padding: 16px 16px 120px;  /* bottom padding keeps last entry clear of taskbar */
            margin-bottom: 0;
        }
        #chatPanel::-webkit-scrollbar { width: 6px; }
        #chatPanel::-webkit-scrollbar-track { background: transparent; }
        #chatPanel::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

        /* ── Chat entries ── */
        .chat-entry {
            margin-bottom: 4px;
        }
        .chat-query {
            color: var(--user-color);
            font-weight: bold;
            margin-bottom: 4px;
            white-space: pre-wrap;
        }
        .chat-label {
            font-size: 13px;
            color: var(--text-dim);
            margin-bottom: 2px;
        }
        .chat-ts {
            font-size: 10px;
            color: var(--text-dim);
            margin-bottom: 4px;
            opacity: 0.7;
        }
        .refine-preview {
            background: var(--surface2);
            border: 1px solid var(--accent, #8a7560);
            border-radius: 2px;
            padding: 8px 12px;
            margin: 4px 0 6px;
            font-size: 12px;
        }
        .refine-label {
            color: var(--accent, #8a7560);
            font-weight: bold;
            margin-bottom: 4px;
        }
        .refine-query-text {
            font-family: var(--font);
            white-space: pre-wrap;
            margin-bottom: 6px;
            color: var(--text);
        }
        .refine-files {
            color: var(--text-dim);
            font-size: 11px;
            margin-bottom: 6px;
        }
        .refine-btns { display: flex; gap: 6px; }
        .refine-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 2px;
            color: var(--text);
            cursor: pointer;
            font-size: 11px;
            padding: 2px 10px;
            font-family: var(--font);
        }
        .refine-btn.accept { border-color: var(--accent, #8a7560); color: var(--accent, #8a7560); }
        .refine-btn.accept:hover { background: var(--accent, #8a7560); color: #fff; }
        
                .code-apply-wrapper { margin: 6px 0; }
        .code-apply-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--surface3, #e8e0d4);
            border: 1px solid var(--border);
            border-bottom: none;
            border-radius: 2px 2px 0 0;
            padding: 3px 8px;
            font-size: 11px;
        }
        .code-file-path {
            flex: 1;
            color: var(--text-dim);
            font-family: var(--font);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .code-apply-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 2px;
            color: var(--text);
            cursor: pointer;
            font-size: 10px;
            padding: 1px 8px;
            font-family: var(--font);
        }
        .code-apply-btn:hover { background: var(--accent, #8a7560); color: #fff; }
        .code-apply-wrapper pre { margin: 0; border-radius: 0 0 2px 2px; }
        .mq-block {
            background: var(--surface2);
            border: 1px dashed var(--border2);
            border-radius: 1px;
            padding: 10px 14px;
            font-size: 13px;
            font-family: var(--font);
            white-space: pre-wrap;
            color: var(--text);
            margin-top: 6px;
        }
        .mq-block.html-content { white-space: normal; }
        .chat-divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 12px 0;
        }
        .thinking { color: var(--text-dim); font-style: italic; }

        /* ── Markdown ── */
        .chat-answer { color: var(--text); white-space: normal; font-size: 15px; line-height: 1.55; }
        .chat-answer h1 { font-size: 17px; font-weight: bold; margin: 10px 0 3px; }
        .chat-answer h2 { font-size: 16px; font-weight: bold; margin: 8px 0 2px; }
        .chat-answer h3 { font-size: 15px; font-weight: bold; margin: 6px 0 1px; }
        .chat-answer h1:first-child,
        .chat-answer h2:first-child,
        .chat-answer h3:first-child { margin-top: 0; }
        .chat-answer p  { margin: 0 0 5px; }
        .chat-answer p + ul, .chat-answer p + ol { margin-top: 0; }
        .chat-answer ul, .chat-answer ol { margin: 2px 0 6px 20px; padding: 0; }
        .chat-answer ol  { list-style-type: decimal; }
        .chat-answer li  { margin: 1px 0; padding-left: 2px; }
        .chat-answer li.sub-item { padding-left: 14px; list-style-type: disc; }
        .chat-answer li::marker { color: var(--text-muted); }
        .chat-answer hr { border: none; border-top: 1px solid var(--border); margin: 8px 0; }
        .chat-answer code {
            font-family: var(--font-mono);
            font-size: 12px;
            background: var(--code-bg);
            color: #86efac;
            border: 1px solid var(--border);
            padding: 1px 5px;
            border-radius: 2px;
        }
        .chat-answer pre {
            background: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: 1px;
            padding: 12px 14px;
            overflow-x: auto;
            margin: 8px 0;
        }
        .chat-answer pre code {
            background: none; border: none; padding: 0;
            font-size: 13px; color: #d4d4d4;
        }
        .chat-answer table {
            border-collapse: collapse; width: 100%; margin: 8px 0;
            font-size: 13px; display: block; overflow-x: auto;
        }
        .chat-answer th {
            background: var(--accent); color: white;
            padding: 6px 10px; text-align: left;
        }
        .chat-answer td { border: 1px solid var(--border); padding: 5px 10px; }
        .chat-answer tr:nth-child(even) { background: var(--surface2); }

        /* ── Response toolbar ── */
        .resp-toolbar { display: flex; align-items: center; gap: 4px; margin-top: 6px; padding-top: 4px; }
        .resp-btn {
            background: transparent; border: none; cursor: pointer;
            font-size: 13px; color: var(--text-dim); padding: 2px 4px;
            border-radius: 2px; height: 22px; line-height: 1;
            font-family: var(--font); transition: color 0.15s;
            display: inline-flex; align-items: center; justify-content: center;
        }
        .resp-btn:hover { color: var(--text); background: transparent; }

        /* ── Mobile ── */
        @media (max-width: 600px) {
            html, body { font-size: 16px; }
            #header h1 { font-size: 22px; }
            #header img { height: 44px; width: 44px; }
            #chatPanel { padding: 10px 10px 120px; }
            #input { font-size: 17px; min-height: 80px; }
            #headerClock { font-size: 12px; }
            #modelBadge { font-size: 14px; }
            .chat-query { font-size: 17px; }
            .chat-ts { font-size: 12px; }
            .chat-answer { font-size: 17px; line-height: 1.6; }
            .chat-answer h1 { font-size: 22px; }
            .chat-answer h2 { font-size: 19px; }
            .chat-answer h3 { font-size: 17px; }
            .chat-answer p, .chat-answer li { font-size: 17px; }
            .resp-btn svg { width: 18px; height: 18px; }
            .mq-block { font-size: 15px; }
        }
    </style>
</head>
<body>
<div id="app">

    <!-- Workspace: chat left, panel right -->
    <div id="workspace">
    <div id="left">

    <!-- Header -->
    <div id="header">
        <img src="mobius-logo.png" alt="mobius">
        <h1>Mobius</h1>
        <div id="headerRight">
            <div id="headerTop">
                <span id="modelBadge">Groq: Llama 3.3 70B</span>
                <span id="targetBadge" onclick="window.toggleTarget && window.toggleTarget()" title="Click to toggle target project" style="display:none;cursor:pointer;font-size:10px;background:var(--surface2);color:var(--accent2);padding:1px 8px;border-radius:8px;border:1px solid var(--border2);font-family:var(--font);"></span>
                <span id="allModeBadge" onclick="window.toggleAllMode && window.toggleAllMode()" title="All Mode ON -- click to toggle off" style="display:none;cursor:pointer;font-size:10px;background:#8d3a3a;color:white;padding:1px 8px;border-radius:8px;text-transform:uppercase;letter-spacing:0.06em;font-family:var(--font);">ALL MODE</span>
                <span id="statusDot" title="Online"></span>
                <button class="header-btn" onclick="showHelp()">Help</button>
            </div>
            <div id="headerClock"></div>
        </div>
    </div>

    <!-- Input area (top) -->
    <div id="inputArea">
        <textarea id="input" placeholder="Ask something..." rows="3"></textarea>
        <div class="controls">
            <!-- Attach file -->
            <button id="addBtn" class="icon-btn" title="Attach file">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
                </svg>
            </button>
            <!-- Scroll to previous response in panel -->
            <button id="respUpBtn" class="icon-btn" title="Previous response" onclick="navigateResponses(-1)">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="17 11 12 6 7 11"/><polyline points="17 18 12 13 7 18"/>
                </svg>
            </button>
            <!-- Scroll to next response in panel -->
            <button id="respDnBtn" class="icon-btn" title="Next response" onclick="navigateResponses(1)">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="7 13 12 18 17 13"/><polyline points="7 6 12 11 17 6"/>
                </svg>
            </button>
            <div style="width:1px;height:18px;background:var(--border);margin:0 2px;"></div>
            <!-- Navigate query history -->
            <button id="prevBtn" class="icon-btn" title="Previous query" onclick="navigateHistory(-1)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="18 15 12 9 6 15"/>
                </svg>
            </button>
            <!-- Navigate down -->
            <button id="nextBtn" class="icon-btn" title="Next query" onclick="navigateHistory(1)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="6 9 12 15 18 9"/>
                </svg>
            </button>
            <!-- Panel toggle (right side) -->
            <div style="flex:1"></div>
            <button id="panelToggleBtn" class="icon-btn" title="Toggle output panel" onclick="window.panel && window.panel.toggle()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="1"/>
                    <line x1="9" y1="3" x2="9" y2="21"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- Chat panel -->
    <div id="chatPanel"></div>

    </div><!-- /#left -->
    <div id="right"></div>
    </div><!-- /#workspace -->

</div>

<script>
// ── Utilities ─────────────────────────────────────────────────────────────────

function escapeHtml(t) {
    return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function scrollToBottom() {
    const p = document.getElementById('chatPanel');
    p.scrollTop = p.scrollHeight;
}

// ── Session ID ────────────────────────────────────────────────────────────────

function generateSessionId() {
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
        const r = Math.random() * 16 | 0;
        return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
    });
}
let currentSessionId = generateSessionId();
window.getCurrentSessionId = () => currentSessionId;

// ── Input history ─────────────────────────────────────────────────────────────

const inputHistory = JSON.parse(localStorage.getItem('mc_input_history') || '[]');
let inputHistIdx   = -1;
let inputHistDraft = '';

function saveInputHistory() {
    try { localStorage.setItem('mc_input_history', JSON.stringify(inputHistory.slice(0, 100))); } catch(e) {}
}

function navigateHistory(dir) {
    const textarea = document.getElementById('input');
    if (!inputHistory.length) return;
    if (dir === -1) {
        if (inputHistIdx === -1) inputHistDraft = textarea.value;
        inputHistIdx = Math.min(inputHistIdx + 1, inputHistory.length - 1);
    } else {
        if (inputHistIdx <= 0) { inputHistIdx = -1; textarea.value = inputHistDraft; textarea.focus(); return; }
        inputHistIdx--;
    }
    textarea.value = inputHistory[inputHistIdx];
    textarea.style.height = 'auto';
    textarea.style.height = Math.min(textarea.scrollHeight, 200) + 'px';
    textarea.focus();
}

// ── Markdown renderer ─────────────────────────────────────────────────────────

window.markdownToHtml = function markdownToHtml(text) {
    if (!text) return '';
    text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');

    // Tables
    text = text.replace(/\|(.+)\|\n\|[-| :]+\|\n((?:\|.+\|\n?)+)/g, (match, header, rows) => {
        const ths = header.split('|').filter(s=>s.trim()).map(s=>`<th>${s.trim()}</th>`).join('');
        const trs = rows.trim().split('\n').map(row=>{
            const tds = row.split('|').filter(s=>s.trim()).map(s=>`<td>${s.trim()}</td>`).join('');
            return `<tr>${tds}</tr>`;
        }).join('');
        return `<table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
    });

    // Fenced code blocks
    const codeBlocks = [];
    text = text.replace(/```([\w]*)\n?([\s\S]*?)```/g, (m, lang, code) => {
        codeBlocks.push({ lang, code });
        return `\x00CODE${codeBlocks.length-1}\x00`;
    });

    const lines = text.split('\n');
    const out   = [];
    let inUl = false;
    let inOl = false;

    function closeLists() {
        if (inUl) { out.push('</ul>'); inUl = false; }
        if (inOl) { out.push('</ol>'); inOl = false; }
    }

    for (const line of lines) {
        // Headings
        if (/^### /.test(line)) { closeLists(); out.push('<h3>'+inline(line.slice(4))+'</h3>'); continue; }
        if (/^## /.test(line))  { closeLists(); out.push('<h2>'+inline(line.slice(3))+'</h2>'); continue; }
        if (/^# /.test(line))   { closeLists(); out.push('<h1>'+inline(line.slice(2))+'</h1>'); continue; }

        // Horizontal rule
        if (/^---+$/.test(line.trim())) { closeLists(); out.push('<hr style="border:none;border-top:1px solid #c9bfae;margin:8px 0">'); continue; }

        // Top-level bullet (- or * at column 0)
        if (/^[\*\-] /.test(line)) {
            if (inOl) { out.push('</ol>'); inOl = false; }
            if (!inUl) { out.push('<ul>'); inUl = true; }
            out.push('<li>'+inline(line.slice(2))+'</li>');
            continue;
        }

        // Indented sub-item (spaces + - or *)
        if (/^\s+[\*\-] /.test(line)) {
            if (!inUl) { out.push('<ul>'); inUl = true; }
            out.push('<li class="sub-item">'+inline(line.replace(/^\s+[\*\-] /, ''))+'</li>');
            continue;
        }

        // Numbered list
        if (/^\d+\. /.test(line)) {
            if (inUl) { out.push('</ul>'); inUl = false; }
            if (!inOl) { out.push('<ol>'); inOl = true; }
            out.push('<li>'+inline(line.replace(/^\d+\. /, ''))+'</li>');
            continue;
        }

        // End any open list before a non-list line
        closeLists();

        // Blank line -- no output, paragraph margin handles the gap
        if (!line.trim()) continue;

        // Normal paragraph
        out.push('<p>'+inline(line)+'</p>');
    }
    closeLists();

    // Wrap in chat-answer so CSS rules apply
    let html = '<div class="chat-answer">' + out.join('') + '</div>';
    html = html.replace(/\x00CODE(\d+)\x00/g, (_, i) => {
        const { lang, code } = codeBlocks[i];
        const safe = code.replace(/</g,'&lt;').replace(/>/g,'&gt;');
        // Detect // path/to/file.ext on first line
        const firstLine = code.split('\n')[0] || '';
        const fpMatch = firstLine.startsWith('//') && firstLine.match(/((?:[\w][\w\-]*\/)+[\w][\w.\-]*\.[a-zA-Z]{1,6})/);
        if (fpMatch) {
            const fp = fpMatch[1];
            const safeDisplay = fp.replace(/</g,'&lt;');
            return `<div class="code-apply-wrapper"><div class="code-apply-bar"><span class="code-file-path">${safeDisplay}</span><button class="code-apply-btn" onclick="applyCodeToFile('${fp}',this)">Apply</button></div><pre><code>${safe}</code></pre></div>`;
        }
        return `<pre><code>${safe}</code></pre>`;
    });
    return html;

    function inline(s) {
        return s
            .replace(/`([^`]+)`/g,'<code>$1</code>')
            .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
            .replace(/\*(.+?)\*/g,'<em>$1</em>')
            .replace(/_(.+?)_/g,'<em>$1</em>');
    }
};

// ── Target project badge ─────────────────────────────────────────────────────
// Tracks which handle file commands operate on: 'home' or 'project'.
// Badge is hidden until at least one handle is set.

window._targetMode = 'project'; // default: use open project if available

window.getTargetHandle = function () {
    const projectHandle = window.getRootHandle ? window.getRootHandle() : null;
    const homeHandle    = window.coderRootHandle || null;
    if (window._targetMode === 'home') return homeHandle || projectHandle;
    return projectHandle || homeHandle;
};

window.updateTargetBadge = function () {
    const badge         = document.getElementById('targetBadge');
    if (!badge) return;
    const projectHandle = window.getRootHandle ? window.getRootHandle() : null;
    const homeHandle    = window.coderRootHandle || null;
    if (!projectHandle && !homeHandle) { badge.style.display = 'none'; return; }
    badge.style.display = '';
    // If only one handle exists, no toggle needed -- show it greyed
    if (!projectHandle || !homeHandle) {
        const h = projectHandle || homeHandle;
        badge.textContent = h.name;
        badge.style.cursor = 'default';
        badge.title = 'Target: ' + h.name;
        return;
    }
    badge.style.cursor = 'pointer';
    const active = window._targetMode === 'home' ? homeHandle : projectHandle;
    badge.textContent = active.name;
    badge.title = 'Target: ' + active.name + ' -- click to switch to ' +
        (window._targetMode === 'home' ? projectHandle.name : homeHandle.name);
};

window.toggleTarget = function () {
    const projectHandle = window.getRootHandle ? window.getRootHandle() : null;
    const homeHandle    = window.coderRootHandle || null;
    if (!projectHandle || !homeHandle) return; // nothing to toggle
    window._targetMode = window._targetMode === 'home' ? 'project' : 'home';
    window.updateTargetBadge();
};

// ── Entry → Panel map ────────────────────────────────────────────────────────
// Maps each chat entry element to its associated panel data (if any).
// Populated after each command completes.

const _entryPanelMap = new Map();

// ── runCommandInPanel ─────────────────────────────────────────────────────────

function runCommandInPanel(queryText) {
    const panel = document.getElementById('chatPanel');
    const entry = document.createElement('div');
    entry.className = 'chat-entry';

    const qLine = document.createElement('div');
    qLine.className = 'chat-query';
    qLine.textContent = 'Q: ' + queryText;
    entry.appendChild(qLine);

    const tsLine = document.createElement('div');
    tsLine.className = 'chat-ts';
    const _now = new Date();
    const _h = _now.getHours(), _m = _now.getMinutes();
    tsLine.textContent = (_h % 12 || 12) + ':' + String(_m).padStart(2,'0') + ' ' + (_h < 12 ? 'am' : 'pm');
    entry.appendChild(tsLine);

    const outputEl = document.createElement('div');
    outputEl.className = 'mq-block';
    entry.appendChild(outputEl);

    panel.appendChild(entry);
    scrollToBottom();

    // Click entry to restore its linked panel (populated after command completes)
    entry.addEventListener('click', e => {
        // Don't trigger if clicking a button inside the entry
        if (e.target.closest('button, a, input')) return;
        const data = _entryPanelMap.get(entry);
        if (data && window.panel) {
            window.panel.open(data.title, data.content, data.type);
        } else if (window.panel && window.panel.isOpen()) {
            window.panel.close();
        }
    });

    const outputFn = msg => {
        if (!outputEl.classList.contains('html-content')) outputEl.textContent = msg;
        scrollToBottom();
    };
    return { entry, outputEl, outputFn, tsLine };
}

// ── showHelp -- opens in the right panel ─────────────────────────────────────

function showHelp() {
    // Build help HTML using the help module
    const dummy  = document.createElement('div');
    const dummyFn = msg => { if (!dummy.innerHTML) dummy.textContent = msg; };
    if (window.COMMANDS && window.COMMANDS['?']) {
        window.COMMANDS['?'].handler('', dummyFn, dummy);
        if (window.panel) {
            window.panel.open('Help', dummy.innerHTML, 'html');
            return;
        }
    }
    // Fallback: show in chat
    const { outputEl, outputFn } = runCommandInPanel('?');
    if (window.COMMANDS && window.COMMANDS['?']) {
        window.COMMANDS['?'].handler('', outputFn, outputEl);
    }
}

// ── Response navigation -- scroll chatPanel to prev/next entry ────────────────

let respNavIdx = -1;
function navigateResponses(dir) {
    const panel   = document.getElementById('chatPanel');
    const entries = Array.from(panel.querySelectorAll('.chat-entry'));
    if (!entries.length) return;
    if (respNavIdx === -1) { respNavIdx = dir === -1 ? entries.length - 1 : 0; }
    else { respNavIdx = Math.max(0, Math.min(entries.length - 1, respNavIdx + dir)); }
    entries[respNavIdx].scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── handleAsk ─────────────────────────────────────────────────────────────────

async function handleAsk() {
    const input = document.getElementById('input');
    const text  = input.value.trim();
    if (!text) return;

    if (!inputHistory.length || inputHistory[0] !== text) {
        inputHistory.unshift(text);
        if (inputHistory.length > 100) inputHistory.pop();
        saveInputHistory();
    }
    inputHistIdx = -1; inputHistDraft = '';

    input.value = '';
    input.style.height = 'auto';

    const { entry, outputEl, outputFn } = runCommandInPanel(text);
    const detected = window.detectCommand ? window.detectCommand(text) : null;

    let response = null;
    if (detected && window.COMMANDS && window.COMMANDS[detected.command]) {
        response = await window.COMMANDS[detected.command].handler(detected.args, outputFn, outputEl);
        if (window.getLastModel) updateModelBadge(window.getLastModel());
        _linkEntryToPanel(entry);
        saveChatEntry(tsLine.textContent, text, response || outputEl.textContent);
        return;
    }

    if (window.sendToLastModel) {
        response = await window.sendToLastModel(text, outputFn, outputEl);
        if (window.getLastModel) updateModelBadge(window.getLastModel());
    } else {
        outputFn('Error: AI not loaded yet.');
    }
    _linkEntryToPanel(entry);
    saveChatEntry(tsLine.textContent, text, response || outputEl.textContent);
}

// ── _linkEntryToPanel ────────────────────────────────────────────────────────
// After a command completes, checks if the panel was opened and links its
// data to the chat entry. Entry gets a pointer cursor as a visual hint.

function _linkEntryToPanel(entry) {
    if (!window.panel || !window.panel.getLastData) return;
    const data = window.panel.getLastData();
    if (data && data.content) {
        _entryPanelMap.set(entry, data);
        entry.style.cursor = 'pointer';
        entry.title = 'Click to restore panel: ' + (data.title || '');
    }
}

// ── Apply code block to project file ─────────────────────────────────────────
window.applyCodeToFile = async function(filePath, btn) {
    const root = window.getRootHandle ? window.getRootHandle() : null;
    if (!root) { alert('No project open. Run Project: Open first.'); return; }
    const wrapper = btn.closest('.code-apply-wrapper');
    const raw = wrapper.querySelector('code').textContent;
    // Strip the leading // filepath comment line
    const code = raw.replace(/^\/\/[^\n]*\n/, '');
    try {
        btn.textContent = 'Writing...';
        btn.disabled = true;
        const parts = filePath.split('/');
        const fileName = parts.pop();
        let dir = root;
        for (const part of parts) {
            dir = await dir.getDirectoryHandle(part, { create: false });
        }
        const fh = await dir.getFileHandle(fileName, { create: false });
        const writable = await fh.createWritable();
        await writable.write(code);
        await writable.close();
        btn.textContent = 'Applied ✓';
        btn.style.color = 'var(--green)';
        btn.style.borderColor = 'var(--green)';
        btn.disabled = true; // stays permanently
    } catch (err) {
        btn.textContent = 'Error: ' + err.message.slice(0, 30);
        btn.style.color = 'var(--red, #c0392b)';
        setTimeout(() => { btn.textContent = 'Apply'; btn.style.color = ''; btn.disabled = false; }, 4000);
        console.error('applyCodeToFile:', err);
    }
};


// ── addToHistory: called by all.js when thumbs-up selects a winner ────────────
// Replaces the all-mode multi-response block with just the winning response,
// saves it as a compact chat entry, and stores it for Brief Protocol context.
window.addToHistory = function(query, replyText) {
    const el = window._lastOutputEl;
    if (el) {
        // Collapse all-mode cards down to the single winning response
        el.classList.add('html-content');
        el.innerHTML = window.markdownToHtml
            ? window.markdownToHtml(replyText)
            : '<pre>' + replyText.replace(/</g,'&lt;') + '</pre>';
    }
    // Save to localStorage as a compact entry (winner only)
    const ts = window._lastTsLine ? window._lastTsLine.textContent : '';
    saveChatEntry(ts, query, replyText);
    // Store for next Brief Protocol context injection
    window._lastSelectedReply = replyText;
};


// ── Chat persistence (no login required) ─────────────────────────────────────
const CHAT_STORE = 'mobius_chat';

function _chatLoad() {
    try { return JSON.parse(localStorage.getItem(CHAT_STORE) || '[]'); } catch { return []; }
}

function saveChatEntry(ts, query, response) {
    const entries = _chatLoad();
    entries.push({ ts, query, response, date: new Date().toLocaleDateString('en-AU') });
    if (entries.length > 300) entries.splice(0, entries.length - 300);
    try { localStorage.setItem(CHAT_STORE, JSON.stringify(entries)); } catch (e) { /* storage full */ }
}

function restoreChat() {
    const entries = _chatLoad();
    if (!entries.length) return;
    const panel = document.getElementById('chatPanel');
    const header = document.createElement('div');
    header.style.cssText = 'font-size:10px;color:var(--text-dim);padding:4px 0 10px;opacity:0.55;border-bottom:1px dashed var(--border);margin-bottom:8px;';
    header.textContent = '-- ' + entries.length + ' entries restored from previous session --';
    panel.appendChild(header);
    entries.forEach(e => {
        const entry = document.createElement('div');
        entry.className = 'chat-entry';
        const q = document.createElement('div');
        q.className = 'chat-query';
        q.textContent = 'Q: ' + e.query;
        const ts = document.createElement('div');
        ts.className = 'chat-ts';
        ts.textContent = (e.date ? e.date + '  ' : '') + (e.ts || '');
        const resp = document.createElement('div');
        resp.className = 'mq-block';
        resp.textContent = e.response || '';
        entry.appendChild(q);
        entry.appendChild(ts);
        entry.appendChild(resp);
        panel.appendChild(entry);
    });
    scrollToBottom();
    // Restore last selected reply for Brief Protocol context injection
    if (entries.length) window._lastSelectedReply = entries[entries.length - 1].response;
}


window.newChat = function(topic) {
    document.getElementById('chatPanel').innerHTML = '';
    currentSessionId = generateSessionId();
    try { localStorage.removeItem(CHAT_STORE); } catch(e) {}
    if (topic) {
        document.getElementById('input').value = topic;
        handleAsk();
    } else {
        document.getElementById('input').focus();
    }
};

// ── Event listeners ───────────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', () => {
    restoreChat();
    const textarea = document.getElementById('input');

    textarea.addEventListener('input', () => {
        textarea.style.height = 'auto';
        textarea.style.height = Math.min(textarea.scrollHeight, 200) + 'px';
    });

    // Attach file button
    document.getElementById('addBtn').addEventListener('click', () => {
        const inp = document.createElement('input');
        inp.type     = 'file';
        inp.multiple = true;
        inp.accept   = 'image/*,.pdf,.txt,.js,.ts,.jsx,.tsx,.py,.json,.md,.csv,.html,.css';
        inp.onchange = () => {
            const files = Array.from(inp.files);
            if (!files.length) return;
            window._attachedFiles = files;          // array (replaces _attachedFile)
            window._attachedFile  = files[0];       // backward compat
            const textarea = document.getElementById('input');
            const tag = files.map(f => '[Attached: ' + f.name + ']').join('\n');
            textarea.value = tag + (textarea.value ? '\n' + textarea.value : '');
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 200) + 'px';
            const btn = document.getElementById('addBtn');
            btn.style.color = 'var(--green)';
            btn.title = files.length === 1
                ? 'Attached: ' + files[0].name + ' (click to change)'
                : files.length + ' files attached (click to change)';
        };
        inp.click();
    });

    textarea.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleAsk(); return; }
        if (e.key === 'Escape') { textarea.value = ''; textarea.style.height = 'auto'; return; }
        if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
            const val = textarea.value;
            const pos = textarea.selectionStart;
            const lines = val.split('\n');
            const onFirst = lines.length === 1 || pos <= val.indexOf('\n');
            const onLast  = lines.length === 1 || pos >= val.lastIndexOf('\n') + 1;
            if (!inputHistory.length) return;
            if (e.key === 'ArrowUp' && onFirst) {
                e.preventDefault();
                navigateHistory(-1);
            } else if (e.key === 'ArrowDown' && onLast) {
                e.preventDefault();
                navigateHistory(1);
            }
        }
    });

    window.addEventListener('online',  updateStatusDot);
    window.addEventListener('offline', updateStatusDot);
    updateStatusDot();

    // Clock — updates every second, zero latency impact
    function updateClock() {
        const el = document.getElementById('headerClock');
        if (!el) return;
        const now = new Date();
        el.textContent = now.toLocaleDateString('en-AU', { weekday:'short', day:'numeric', month:'short', year:'numeric' })
            + '  ' + now.toLocaleTimeString('en-AU', { hour:'numeric', minute:'2-digit', second:'2-digit', hour12:true });
    }
    updateClock();
    setInterval(updateClock, 1000);

    textarea.focus();
});
